name: Compile LaTeX to PDF

on:
  push:
    paths:
      - 'roadmap.tex'
      - 'Resources/**'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v4
        with:
          root_file: roadmap.tex

      - name: Commit PDF to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f roadmap.pdf
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "build: update roadmap.pdf [skip ci]"
          git push

      - name: Prepare deployment directory
        run: |
          mkdir -p _site
          cp roadmap.pdf _site/
          cp roadmap.pdf _site/index.pdf
          if [ -d "Resources" ]; then cp -r Resources _site/; fi
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Software Engineering Mastery Roadmap</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #0d1117; color: #c9d1d9; }
              .container { text-align: left; padding: 2rem; background: #161b22; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; width: 100%; }
              a { color: #58a6ff; text-decoration: none; }
              a:hover { text-decoration: underline; }
              h1 { font-size: 1.8rem; margin-top: 0; border-bottom: 1px solid #30363d; padding-bottom: 0.5rem; text-align: center; }
              h2 { font-size: 1.4rem; margin-top: 1.5rem; }
              p { color: #8b949e; }
              ul { list-style-type: none; padding: 0; }
              li { margin-bottom: 0.5rem; padding: 0.5rem; background: #0d1117; border-radius: 4px; border: 1px solid #30363d; }
              li::before { content: '📄 '; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>📘 Software Engineering Mastery Roadmap</h1>
              <h2>Main Document</h2>
              <ul>
                <li><a href="roadmap.pdf">Software Engineering Mastery Roadmap (PDF)</a></li>
              </ul>
              
              <h2>Supplementary Resources</h2>
              <ul>
          EOF
          
          if [ -d "Resources" ] && [ "$(ls -A Resources)" ]; then
            for file in Resources/*; do
              basename=$(basename "$file")
              echo "        <li><a href=\"Resources/$basename\">$basename</a></li>" >> _site/index.html
            done
          else
            echo "        <li>No resources available yet.</li>" >> _site/index.html
          fi
          
          cat >> _site/index.html << 'EOF'
              </ul>
            </div>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
